[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# API Redirects
[[redirects]]
  from = "/api/gemini/*"
  to = "/.netlify/functions/gemini-proxy"
  status = 200

[[redirects]]
  from = "/api/openai/*"
  to = "/.netlify/functions/openai-proxy"
  status = 200

[[redirects]]
  from = "/api/feedback/*"
  to = "https://formspree.io/:splat"
  status = 200

# Fix: Ensure assets return 404 instead of index.html if missing
# This avoids the "MIME type text/html" error
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 404

# Redirect all navigation routes to index.html for SPA (HashRouter compatible)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache Control and Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"

# Prevent index.html from being cached by the browser/CDN
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
