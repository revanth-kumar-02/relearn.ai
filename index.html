    /* Mobile Only Scrollbar Hiding */
    @media (max-width: 767px) {

    /* Optional class for elements that should always hide scrollbars */
    .no-scrollbar-always::-webkit-scrollbar {

    }

    .no-scrollbar-always {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Ensure icons don't block input clicks */
    .input-icon {
      pointer-events: none;
      user-select: none;
    }

    /* Yoyo Marquee Animation */
    @keyframes yoyo {
      0%, 10% { transform: translateX(0); }
      90%, 100% { transform: translateX(var(--scroll-dist, 0)); }
    }

    .marquee-container {
      overflow: hidden;
      width: 100%;
      position: relative;
    }

    .marquee-content {
      display: flex;
      gap: 1.5rem;
      width: max-content;
      will-change: transform;
    }

    .marquee-content.animating {

    }

    }

<body

  <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              if (newWorker) {
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // New content is available; please refresh.
                    window.location.reload();
                  }
                });
              }
            });
          }).catch(err => {
            console.log('SW registration failed: ', err);
          });
        });

        // Handle controller change (ensures all tabs stay in sync)
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            window.location.reload();
            refreshing = true;
          }
        });
      }
    </script>
  </body>
